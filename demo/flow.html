<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dag-map flow layout demo</title>
<style>
  :root {
    --dm-paper: #1E1E2E;
    --dm-ink: #CDD6F4;
    --dm-muted: #6C7086;
    --dm-border: #313244;
    --dm-font: 'Inter', 'Segoe UI', system-ui, sans-serif;
    --dm-radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--dm-font);
    background: var(--dm-paper);
    color: var(--dm-ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Nav bar ── */
  .dm-nav {
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--dm-border);
    font-size: 11px;
    letter-spacing: 0.06em;
  }

  .dm-nav-title {
    font-weight: 600;
    color: var(--dm-ink);
    opacity: 0.8;
  }

  .dm-nav a {
    color: var(--dm-muted);
    text-decoration: none;
    padding: 2px 8px;
    border-radius: var(--dm-radius);
    transition: all 0.15s;
  }

  .dm-nav a:hover {
    color: var(--dm-ink);
    background: var(--dm-border);
  }

  .dm-nav a.active {
    color: var(--dm-ink);
    background: var(--dm-border);
  }

  /* ── Controls bar ── */
  .dm-controls {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--dm-border);
  }

  .dm-controls label {
    font-size: 11px;
    color: var(--dm-muted);
    letter-spacing: 0.06em;
  }

  .dm-controls select {
    font-family: var(--dm-font);
    font-size: 11px;
    padding: 4px 8px;
    border: 1px solid var(--dm-border);
    background: var(--dm-paper);
    color: var(--dm-ink);
    border-radius: var(--dm-radius);
    cursor: pointer;
  }

  /* ── Parameter sliders ── */
  .dm-params {
    padding: 8px 24px;
    font-size: 11px;
    color: var(--dm-muted);
    border-bottom: 1px solid var(--dm-border);
  }

  .dm-params summary {
    cursor: pointer;
    letter-spacing: 0.06em;
    padding: 4px 0;
    font-weight: 500;
    font-size: 10px;
    text-transform: uppercase;
  }

  .dm-params .dm-grid {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    padding: 8px 0;
    align-items: center;
  }

  .dm-param {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--dm-muted);
  }

  .dm-param input[type="range"] {
    width: 72px;
    accent-color: #89B4FA;
  }

  .dm-val {
    min-width: 28px;
    font-size: 9px;
    color: var(--dm-muted);
    opacity: 0.7;
    font-variant-numeric: tabular-nums;
  }

  /* ── SVG container ── */
  .dm-canvas {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
    overflow: auto;
  }

  .dm-canvas svg {
    max-width: 100%;
    height: auto;
  }

  /* ── Status bar ── */
  .dm-status {
    padding: 6px 24px;
    font-size: 9px;
    color: var(--dm-muted);
    opacity: 0.6;
    border-top: 1px solid var(--dm-border);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<!-- Navigation -->
<div class="dm-nav">
  <span class="dm-nav-title">dag-map</span>
  <a href="dag.html">dag</a>
  <a href="hasse.html">hasse</a>
  <a href="flow.html" class="active">flow</a>
</div>

<!-- Model selector -->
<div class="dm-controls">
  <label for="dm-model">MODEL</label>
  <select id="dm-model"></select>
</div>

<!-- Parameter sliders -->
<div class="dm-params">
  <details open>
    <summary>PARAMETERS</summary>
    <div class="dm-grid">
      <div class="dm-param">
        <label for="dm-scale">scale</label>
        <input type="range" id="dm-scale" min="0.5" max="4" step="0.1" value="1.8">
        <span class="dm-val" id="dm-scale-val">1.8</span>
      </div>
      <div class="dm-param">
        <label for="dm-layerSpacing">layerSpacing</label>
        <input type="range" id="dm-layerSpacing" min="20" max="120" step="5" value="50">
        <span class="dm-val" id="dm-layerSpacing-val">50</span>
      </div>
      <div class="dm-param">
        <label for="dm-columnSpacing">columnSpacing</label>
        <input type="range" id="dm-columnSpacing" min="30" max="160" step="5" value="70">
        <span class="dm-val" id="dm-columnSpacing-val">70</span>
      </div>
      <div class="dm-param">
        <label for="dm-dotSpacing">dotSpacing</label>
        <input type="range" id="dm-dotSpacing" min="4" max="30" step="1" value="12">
        <span class="dm-val" id="dm-dotSpacing-val">12</span>
      </div>
      <div class="dm-param">
        <label for="dm-cornerRadius">cornerRadius</label>
        <input type="range" id="dm-cornerRadius" min="0" max="20" step="1" value="5">
        <span class="dm-val" id="dm-cornerRadius-val">5</span>
      </div>
      <div class="dm-param">
        <label for="dm-lineThickness">lineThickness</label>
        <input type="range" id="dm-lineThickness" min="1" max="8" step="0.5" value="3">
        <span class="dm-val" id="dm-lineThickness-val">3</span>
      </div>
    </div>
  </details>
</div>

<!-- SVG output -->
<div class="dm-canvas" id="dm-canvas"></div>

<!-- Status -->
<div class="dm-status" id="dm-status">Ready</div>

<script type="module">
import { layoutFlow } from '../src/layout-flow.js';
import { renderSVG } from '../src/render.js';
import { createStationRenderer, createEdgeRenderer } from '../src/render-flow-station.js';

// ================================================================
// Inline model data (extracted from test/models.js)
// ================================================================

const palette = {
  paper: '#1E1E2E', ink: '#CDD6F4', muted: '#6C7086', border: '#313244',
  classes: {
    a: '#E06C9F', b: '#2B9DB5', c: '#3D5BA9', d: '#94E2D5', e: '#D4944C',
    f: '#A6E3A1', g: '#CBA6F7', h: '#F38BA8', i: '#89B4FA', j: '#FAB387',
  },
};

function m(id, label, subtitle, nodes, edges, routes, opts = {}) {
  return {
    id,
    label,
    subtitle,
    dag: {
      nodes: nodes.map(n => ({ id: n[0], label: n[1], count: n[2] || '' })),
      edges,
    },
    routes: routes.map(r => ({ id: r.id, cls: r.cls, nodes: r.nodes })),
    theme: {
      ...palette,
      classes: Object.fromEntries(routes.map(r => [r.cls, palette.classes[r.cls]])),
    },
    opts: {
      scale: 1.8,
      layerSpacing: 50,
      columnSpacing: 70,
      dotSpacing: 12,
      cornerRadius: 5,
      lineThickness: 3,
      ...opts,
    },
  };
}

const models = [

  // ── O2C Full (5 classes, 12 nodes) ──
  m('o2c_full', 'Order-to-Cash', 'Order | Delivery | Invoice | Shipping | Payment', [
    ['create_order', 'Create Sales Order', '1.32M'],
    ['change_order', 'Change Sales Order', '253K'],
    ['gen_delivery', 'Generate Delivery', '1.22M'],
    ['release_delivery', 'Release Delivery', '1.3M'],
    ['pick_goods', 'Pick Goods', '330K'],
    ['ship_goods', 'Ship Goods', '1.29M'],
    ['create_invoice', 'Create Invoice', '1.29M'],
    ['send_invoice', 'Send Invoice', '1.29M'],
    ['receive_confirm', 'Receive Confirmation', '1.29M'],
    ['clear_invoice', 'Clear Invoice', '1.29M'],
    ['delivery_passed', 'Delivery Date Passed', '1.21M'],
    ['record_payment', 'Record Payment', '892K'],
  ], [
    ['create_order','change_order'],['create_order','gen_delivery'],['change_order','gen_delivery'],
    ['gen_delivery','release_delivery'],['release_delivery','pick_goods'],['pick_goods','ship_goods'],
    ['ship_goods','create_invoice'],['ship_goods','receive_confirm'],['create_invoice','send_invoice'],
    ['send_invoice','clear_invoice'],['receive_confirm','delivery_passed'],
    ['clear_invoice','record_payment'],['delivery_passed','record_payment'],
  ], [
    { id: 'order', cls: 'a', nodes: ['create_order','change_order','gen_delivery','release_delivery','pick_goods','ship_goods','create_invoice','send_invoice','clear_invoice','record_payment'] },
    { id: 'delivery', cls: 'b', nodes: ['create_order','gen_delivery','release_delivery','pick_goods','ship_goods','receive_confirm','delivery_passed','record_payment'] },
    { id: 'invoice', cls: 'c', nodes: ['ship_goods','create_invoice','send_invoice','clear_invoice','record_payment'] },
    { id: 'shipping', cls: 'd', nodes: ['release_delivery','pick_goods','ship_goods','receive_confirm'] },
    { id: 'payment', cls: 'e', nodes: ['clear_invoice','record_payment'] },
  ]),

  // ── Healthcare (5 classes, 9 nodes) ──
  m('healthcare', 'Healthcare Patient Flow', 'Patient | Doctor | Lab | Radiology | Nursing', [
    ['register', 'Register Patient'],
    ['triage', 'Triage'],
    ['consult', 'Doctor Consult'],
    ['lab', 'Lab Tests'],
    ['imaging', 'Imaging'],
    ['diagnose', 'Diagnosis'],
    ['treat', 'Treatment'],
    ['discharge', 'Discharge'],
    ['followup', 'Follow-up'],
  ], [
    ['register','triage'],['triage','consult'],['consult','lab'],['consult','imaging'],
    ['lab','diagnose'],['imaging','diagnose'],['diagnose','treat'],['treat','discharge'],
    ['discharge','followup'],
  ], [
    { id: 'patient', cls: 'a', nodes: ['register','triage','consult','lab','diagnose','treat','discharge','followup'] },
    { id: 'doctor', cls: 'b', nodes: ['triage','consult','lab','diagnose','treat'] },
    { id: 'lab_tech', cls: 'c', nodes: ['lab','diagnose'] },
    { id: 'radiology', cls: 'd', nodes: ['imaging','diagnose'] },
    { id: 'nursing', cls: 'e', nodes: ['treat','discharge'] },
  ]),

  // ── Event Planning (5 classes, 9 nodes) ──
  m('event_planning', 'Event Planning', 'Organizer | Marketing | Venue | Speaker | Attendee', [
    ['concept', 'Event Concept'],
    ['budget', 'Budget'],
    ['venue', 'Book Venue'],
    ['speakers', 'Book Speakers'],
    ['promo', 'Promote'],
    ['tickets', 'Ticket Sales'],
    ['setup', 'Setup'],
    ['event', 'Event Day'],
    ['feedback', 'Feedback'],
  ], [
    ['concept','budget'],['budget','venue'],['budget','speakers'],['venue','promo'],
    ['speakers','promo'],['promo','tickets'],['tickets','setup'],['setup','event'],
    ['event','feedback'],
  ], [
    { id: 'organizer', cls: 'a', nodes: ['concept','budget','venue','promo','tickets','setup','event'] },
    { id: 'marketing', cls: 'b', nodes: ['promo','tickets'] },
    { id: 'venue_mgr', cls: 'c', nodes: ['venue','promo','tickets','setup'] },
    { id: 'speaker', cls: 'd', nodes: ['speakers','promo','tickets','setup','event'] },
    { id: 'attendee', cls: 'e', nodes: ['tickets','setup','event','feedback'] },
  ]),

  // ── Procurement (3 classes, 6 nodes) ──
  m('procurement', 'Procurement', 'Purchasing | Warehouse | Finance', [
    ['req', 'Create Requisition', '45K'],
    ['approve', 'Approve', '42K'],
    ['po', 'Create PO', '40K'],
    ['receive', 'Receive Goods', '38K'],
    ['invoice', 'Match Invoice', '37K'],
    ['pay', 'Payment', '36K'],
  ], [
    ['req','approve'],['approve','po'],['po','receive'],['receive','invoice'],['invoice','pay'],
  ], [
    { id: 'purchasing', cls: 'a', nodes: ['req','approve','po','receive'] },
    { id: 'warehouse', cls: 'b', nodes: ['receive','invoice'] },
    { id: 'finance', cls: 'c', nodes: ['invoice','pay'] },
  ]),

  // ── Movie Production (6 classes, 9 nodes) ──
  m('movie_production', 'Movie Production', 'Writer | Director | Producer | VFX | Composer | Distributor', [
    ['script', 'Script'],
    ['cast', 'Casting'],
    ['location', 'Location Scout'],
    ['film', 'Principal Photography'],
    ['vfx', 'VFX'],
    ['edit', 'Editing'],
    ['score', 'Score Music'],
    ['market', 'Marketing'],
    ['release', 'Release'],
  ], [
    ['script','cast'],['script','location'],['cast','film'],['location','film'],
    ['film','vfx'],['film','edit'],['vfx','edit'],['edit','score'],
    ['score','market'],['market','release'],
  ], [
    { id: 'writer', cls: 'a', nodes: ['script'] },
    { id: 'director', cls: 'b', nodes: ['script','cast','film','edit'] },
    { id: 'producer', cls: 'c', nodes: ['cast','film','edit','score','market','release'] },
    { id: 'vfx_studio', cls: 'd', nodes: ['vfx','edit'] },
    { id: 'composer', cls: 'e', nodes: ['score'] },
    { id: 'distributor', cls: 'f', nodes: ['market','release'] },
  ]),

  // ── Insurance Claim (4 classes, 6 nodes) ──
  m('insurance_claim', 'Insurance Claim', 'Claimant | Adjuster | Reject | Repair', [
    ['report', 'Report Claim', '150K'],
    ['assess', 'Assess Damage', '145K'],
    ['approve', 'Approve Claim', '130K'],
    ['reject', 'Reject Claim', '20K'],
    ['repair', 'Arrange Repair', '110K'],
    ['pay', 'Pay Out', '125K'],
  ], [
    ['report','assess'],['assess','approve'],['assess','reject'],
    ['approve','repair'],['approve','pay'],['repair','pay'],
  ], [
    { id: 'claimant', cls: 'a', nodes: ['report','assess','approve','pay'] },
    { id: 'adjuster', cls: 'b', nodes: ['report','assess','approve'] },
    { id: 'reject_flow', cls: 'c', nodes: ['assess','reject'] },
    { id: 'repair', cls: 'd', nodes: ['approve','repair','pay'] },
  ]),

];

// ================================================================
// UI wiring
// ================================================================

const $model = document.getElementById('dm-model');
const $canvas = document.getElementById('dm-canvas');
const $status = document.getElementById('dm-status');

const paramIds = ['scale', 'layerSpacing', 'columnSpacing', 'dotSpacing', 'cornerRadius', 'lineThickness'];
const $params = {};
const $vals = {};
paramIds.forEach(id => {
  $params[id] = document.getElementById(`dm-${id}`);
  $vals[id] = document.getElementById(`dm-${id}-val`);
});

// Populate model selector
models.forEach((m, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = `${m.label} (${m.dag.nodes.length} nodes, ${m.routes.length} routes)`;
  $model.appendChild(opt);
});

function getParams() {
  return {
    scale: parseFloat($params.scale.value),
    layerSpacing: parseFloat($params.layerSpacing.value),
    columnSpacing: parseFloat($params.columnSpacing.value),
    dotSpacing: parseFloat($params.dotSpacing.value),
    cornerRadius: parseFloat($params.cornerRadius.value),
    lineThickness: parseFloat($params.lineThickness.value),
  };
}

function render() {
  const t0 = performance.now();
  const idx = parseInt($model.value, 10);
  const model = models[idx];
  const params = getParams();

  // Update value displays
  paramIds.forEach(id => {
    $vals[id].textContent = $params[id].value;
  });

  try {
    const layout = layoutFlow(model.dag, {
      routes: model.routes,
      theme: model.theme,
      scale: params.scale,
      layerSpacing: params.layerSpacing,
      columnSpacing: params.columnSpacing,
      dotSpacing: params.dotSpacing,
      cornerRadius: params.cornerRadius,
      lineThickness: params.lineThickness,
    });

    const renderNode = createStationRenderer(layout, model.routes);
    const renderEdge = createEdgeRenderer(layout);

    const svg = renderSVG(model.dag, layout, {
      title: model.label,
      subtitle: model.subtitle || '',
      font: "'Inter', 'Segoe UI', system-ui, sans-serif",
      showLegend: false,
      renderNode,
      renderEdge,
    });

    $canvas.innerHTML = svg;
    const ms = (performance.now() - t0).toFixed(1);
    $status.textContent = `${model.label} | ${model.dag.nodes.length} nodes, ${model.dag.edges.length} edges, ${model.routes.length} routes | rendered in ${ms}ms`;
  } catch (err) {
    $canvas.innerHTML = `<pre style="color:#F38BA8;padding:24px;font-size:12px;">${err.message}\n${err.stack}</pre>`;
    $status.textContent = `Error: ${err.message}`;
    console.error(err);
  }
}

// Apply model defaults when switching models
function onModelChange() {
  const idx = parseInt($model.value, 10);
  const model = models[idx];
  const defaults = model.opts;

  paramIds.forEach(id => {
    if (defaults[id] !== undefined) {
      $params[id].value = defaults[id];
      $vals[id].textContent = defaults[id];
    }
  });

  render();
}

// Event listeners
$model.addEventListener('change', onModelChange);
paramIds.forEach(id => {
  $params[id].addEventListener('input', render);
});

// Initial render
onModelChange();
</script>
</body>
</html>
