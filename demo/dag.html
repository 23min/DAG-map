/* =================================================================
 * dag-map.css — Library stylesheet for dag-map
 * =================================================================
 * The minimal CSS needed to use dag-map in your application.
 * Provides CSS custom properties for theming and base container styles.
 *
 * Usage:
 *   <link rel="stylesheet" href="dag-map.css">
 *   <div class="dm-container" id="my-dag"></div>
 *
 * Override theme via CSS custom properties:
 *   :root { --dm-paper: #1E1E2E; --dm-ink: #CDD6F4; }
 *
 * Or via the JS theme system (takes precedence):
 *   layoutMetro(dag, { theme: 'dark' });
 */

/* ── CSS Custom Properties (defaults = cream theme) ── */
:root {
  --dm-paper: #F5F0E8;
  --dm-ink: #2C2C2C;
  --dm-muted: #8C8680;
  --dm-border: #D4CFC7;
  --dm-font: 'IBM Plex Mono', 'Courier New', monospace;
  --dm-radius: 4px;

  /* Node class colors (used when cssVars: true) */
  --dm-cls-pure: #2B8A8E;
  --dm-cls-recordable: #E8846B;
  --dm-cls-side-effecting: #D4944C;
  --dm-cls-gate: #C45B4A;
}

/* ── Container ── */
.dm-container {
  background: var(--dm-paper);
  font-family: var(--dm-font);
  color: var(--dm-ink);
  transition: background 0.2s;
}

.dm-container svg {
  display: block;
  margin: 0 auto;
}

/* ── Code snippet (optional — for showing generated options) ── */
.dm-code {
  margin: 12px 24px;
  padding: 12px 16px;
  background: rgba(0, 0, 0, 0.03);
  border: 1px solid var(--dm-border);
  border-radius: var(--dm-radius);
  font-family: var(--dm-font);
  font-size: 14px;
  line-height: 1.5;
  color: var(--dm-ink);
  white-space: pre;
  overflow-x: auto;
  cursor: text;
  user-select: all;
  -webkit-user-select: all;
}

/* =================================================================
 * demo.css — Styles for the dag-map interactive demo page
 * =================================================================
 * Not needed for library usage. Only for the demo's controls,
 * sliders, and advanced panel.
 */

/* ── Controls bar ── */
.dm-controls {
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--dm-border);
}

.dm-controls label {
  font-size: 14px;
  color: var(--dm-muted);
  letter-spacing: 0.06em;
}

.dm-controls select {
  font-family: var(--dm-font);
  font-size: 14px;
  padding: 4px 8px;
  border: 1px solid var(--dm-border);
  background: var(--dm-paper);
  color: var(--dm-ink);
  border-radius: var(--dm-radius);
  cursor: pointer;
}

.dm-controls input[type="checkbox"] {
  cursor: pointer;
}

.dm-controls input[type="range"] {
  width: 80px;
}

.dm-version {
  font-size: 12px;
  color: var(--dm-muted);
  margin-left: auto;
  opacity: 0.7;
}

/* ── Advanced panel ── */
.dm-advanced {
  padding: 8px 24px;
  font-size: 14px;
  color: var(--dm-muted);
  border-bottom: 1px solid var(--dm-border);
}

.dm-advanced summary {
  cursor: pointer;
  letter-spacing: 0.06em;
  padding: 4px 0;
  font-weight: 500;
}

.dm-advanced .dm-grid {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  padding: 8px 0;
  align-items: center;
}

.dm-advanced label {
  font-size: 13px;
  color: var(--dm-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

.dm-advanced input[type="range"] {
  width: 60px;
}

.dm-advanced .dm-val {
  min-width: 24px;
  font-size: 12px;
  color: var(--dm-muted);
  opacity: 0.7;
}

/* ── Inline label + control groups ── */
.dm-inline {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.dm-angle-control {
  display: none;
  align-items: center;
  gap: 4px;
}

.dm-angle-control.visible {
  display: flex;
}

/* ── GitHub link ── */
.dm-github {
  color: var(--dm-muted);
  opacity: 0.5;
  transition: opacity 0.15s;
  display: flex;
  align-items: center;
}

.dm-github:hover {
  opacity: 1;
}

</style>

<script>
// ============================================================
// dag-map DAG demo — all modules inlined
// ============================================================

// --- route-bezier.js ---
// ================================================================
// route-bezier.js — Bezier S-curve routing (v5 style)
// ================================================================
// Cubic bezier S-curves for smooth, organic edge routing.
// Depart horizontal, curve through a C-shaped bend, arrive horizontal.
// The departure/arrival horizontal run length adapts to the dy/dx ratio.

/**
 * Generate a bezier S-curve path segment from (px, py) to (qx, qy).
 *
 * @param {number} px - source x
 * @param {number} py - source y
 * @param {number} qx - destination x
 * @param {number} qy - destination y
 * @param {number} _routeIdx - (unused, kept for API consistency with angularPath)
 * @param {number} _segIdx - (unused)
 * @param {number} _refY - (unused)
 * @returns {string} SVG path data (without leading M)
 */
function bezierPath(px, py, qx, qy, _routeIdx, _segIdx, _refY) {
  const dx = qx - px, dy = qy - py;
  if (Math.abs(dy) < 0.5) {
    return `L ${qx} ${qy}`;
  }

  const absDy = Math.abs(dy);
  const ratio = absDy / Math.max(dx, 1);

  let departLen, arriveLen;
  if (ratio < 0.4) {
    departLen = dx * 0.30;
    arriveLen = dx * 0.30;
  } else if (ratio < 0.8) {
    departLen = dx * 0.20;
    arriveLen = dx * 0.20;
  } else {
    departLen = dx * 0.12;
    arriveLen = dx * 0.12;
  }

  const x1 = px + departLen;
  const x2 = qx - arriveLen;

  // Cubic bezier: smooth S-curve
  const cp1x = x1 + (x2 - x1) * 0.45;
  const cp1y = py;
  const cp2x = x1 + (x2 - x1) * 0.55;
  const cp2y = qy;

  return `L ${x1} ${py} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x2} ${qy} L ${qx} ${qy}`;
}


// --- route-angular.js ---
// ================================================================
// route-angular.js — Angular progressive routing (R9/R10 style)
// ================================================================
// Interchange-aware angular routing with progressive curves.
// Convergence edges steepen toward the reference line.
// Divergence edges flatten away from it.
// Deterministic per-route variation via hash-based departure/arrival fractions.

/**
 * Progressive curve generator.
 *
 * For convergence (isConvergence=true): the edge is returning toward the
 * reference line (trunk or parent route). The curve STARTS flat (large
 * horizontal run) and ENDS steep (small horizontal run) — "steepening."
 *   Weights: (nSegs - i)^power — first segment gets the most X.
 *
 * For divergence (isConvergence=false): the edge is departing from the
 * reference line. The curve STARTS steep and ENDS flat — "flattening."
 *   Weights: (i + 1)^power — first segment gets the least X.
 *
 * @param {number} startX
 * @param {number} startY
 * @param {number} endX
 * @param {number} endY
 * @param {boolean} isConvergence
 * @param {number} [power=2.2]
 * @returns {string} SVG path data (L segments, no leading M)
 */
function progressiveCurve(startX, startY, endX, endY, isConvergence, power = 2.2) {
  const totalDx = endX - startX;
  const totalDy = endY - startY;
  if (Math.abs(totalDy) < 1) return `L ${endX} ${endY}`;
  if (totalDx < 3) return `L ${endX} ${endY}`;

  // Number of segments based on Y distance
  // ~1 segment per 18px of vertical distance, minimum 2, maximum 5
  const nSegs = Math.max(2, Math.min(5, Math.round(Math.abs(totalDy) / 18)));

  // X distribution: power curve
  const weights = [];
  for (let i = 0; i < nSegs; i++) {
    if (isConvergence) {
      // Convergence: first segments are flat (more X), last are steep (less X)
      weights.push(Math.pow(nSegs - i, power));
    } else {
      // Divergence: first segments are steep (less X), last are flat (more X)
      weights.push(Math.pow(i + 1, power));
    }
  }
  const totalWeight = weights.reduce((a, b) => a + b, 0);

  // Y is distributed EVENLY across segments
  const segDy = totalDy / nSegs;

  // Build path segments
  let d = '';
  let cx = startX;
  let cy = startY;

  for (let i = 0; i < nSegs; i++) {
    const segDx = totalDx * (weights[i] / totalWeight);
    cx += segDx;
    cy += segDy;
    d += `L ${cx.toFixed(1)} ${cy.toFixed(1)} `;
  }

  return d;
}

/**
 * Angular path with interchange-aware direction detection.
 *
 * Route segments determine convergence/divergence by ROLE, not distance:
 *   - FORK segment (src is interchange): always DIVERGENCE
 *   - RETURN segment (dst is interchange): always CONVERGENCE
 *   - INTERNAL segment (both own): use trunk Y fallback
 *
 * @param {number} px - source x
 * @param {number} py - source y
 * @param {number} qx - destination x
 * @param {number} qy - destination y
 * @param {number} routeIdx - route index (used for deterministic variation)
 * @param {number} segIdx - segment index within route
 * @param {number} refY - reference Y for convergence/divergence detection
 * @param {object} [options]
 * @param {number} [options.progressivePower=2.2]
 * @returns {string} SVG path data (without leading M)
 */
function angularPath(px, py, qx, qy, routeIdx, segIdx, refY, options = {}) {
  const power = options.progressivePower ?? 2.2;
  const dx = qx - px, dy = qy - py;
  if (Math.abs(dy) < 1) return `L ${qx} ${qy}`; // horizontal
  if (dx < 3) return `L ${qx} ${qy}`; // too tight

  const srcDistFromRef = Math.abs(py - refY);
  const dstDistFromRef = Math.abs(qy - refY);

  const isConvergence = srcDistFromRef > dstDistFromRef + 0.5;
  const isDivergence = srcDistFromRef + 0.5 < dstDistFromRef;

  // Per-route variation for departure/arrival horizontal runs
  const hash = ((routeIdx * 7 + segIdx * 13) % 17) / 17;

  if (isConvergence) {
    // Long horizontal at branch level (35-45%), then progressive curve to trunk
    const departFrac = 0.35 + hash * 0.10;
    const departX = px + dx * departFrac;
    const remainDx = qx - departX;

    if (remainDx < 5) return `L ${qx} ${qy}`;

    let d = `L ${departX.toFixed(1)} ${py} `; // horizontal at branch level
    d += progressiveCurve(departX, py, qx, qy, true, power); // progressive curve
    return d;

  } else if (isDivergence) {
    // Progressive curve from trunk, then long horizontal at branch level (35-45%)
    const arriveFrac = 0.35 + hash * 0.10;
    const arriveX = qx - dx * arriveFrac;
    const curveDx = arriveX - px;

    if (curveDx < 5) return `L ${qx} ${qy}`;

    let d = progressiveCurve(px, py, arriveX, qy, false, power); // progressive curve
    d += `L ${qx} ${qy}`; // horizontal at branch level
    return d;

  } else {
    // Same level — symmetric
    const departFrac = 0.18 + hash * 0.08;
    const arriveFrac = 0.18 + ((hash * 7) % 1) * 0.08;
    const departX = px + dx * departFrac;
    const arriveX = qx - dx * arriveFrac;
    if (arriveX <= departX + 2) return `L ${qx} ${qy}`;
    return `L ${departX.toFixed(1)} ${py} L ${arriveX.toFixed(1)} ${qy} L ${qx} ${qy}`;
  }
}


// --- themes.js ---
// ================================================================
// themes.js — Theme definitions for dag-map
// ================================================================
// Five built-in themes plus custom theme support via resolveTheme().
//
// The class names (pure, recordable, side_effecting, gate) are defaults.
// Users can use any string keys they want — just pass matching keys in
// the node `cls` field and in a custom theme's `classes` object.

const THEMES = {
  cream: {
    paper: '#F5F0E8', ink: '#2C2C2C', muted: '#8C8680', border: '#D4CFC7',
    classes: { pure: '#2B8A8E', recordable: '#E8846B', side_effecting: '#D4944C', gate: '#C45B4A' }
  },
  light: {
    paper: '#FAFAFA', ink: '#333333', muted: '#999999', border: '#E0E0E0',
    classes: { pure: '#0077B6', recordable: '#E36414', side_effecting: '#6C757D', gate: '#DC3545' }
  },
  dark: {
    paper: '#1E1E2E', ink: '#CDD6F4', muted: '#6C7086', border: '#313244',
    classes: { pure: '#94E2D5', recordable: '#F38BA8', side_effecting: '#F9E2AF', gate: '#EBA0AC' }
  },
  blueprint: {
    paper: '#1B2838', ink: '#E0E8F0', muted: '#5A7A9A', border: '#2A4060',
    classes: { pure: '#4FC3F7', recordable: '#FF8A65', side_effecting: '#FFD54F', gate: '#EF5350' }
  },
  mono: {
    paper: '#FFFFFF', ink: '#1A1A1A', muted: '#888888', border: '#CCCCCC',
    classes: { pure: '#444444', recordable: '#777777', side_effecting: '#999999', gate: '#333333' }
  },
  metro: {
    paper: '#FFFFFF', ink: '#1A1A1A', muted: '#9E9E9E', border: '#D4EAF7',
    classes: { pure: '#0078C8', recordable: '#E3242B', side_effecting: '#F5A623', gate: '#6A2D8E' },
    lineOpacity: 1.4
  }
};

/**
 * Resolve a theme option to a full theme object.
 *
 * @param {string|object} [themeOption] - theme name string, custom theme object, or undefined
 * @returns {object} resolved theme with paper, ink, muted, border, and classes
 */
function resolveTheme(themeOption) {
  if (!themeOption || themeOption === 'cream') return THEMES.cream;
  if (typeof themeOption === 'string') return THEMES[themeOption] || THEMES.cream;
  // Custom theme object — merge with cream defaults
  return { ...THEMES.cream, ...themeOption, classes: { ...THEMES.cream.classes, ...(themeOption.classes || {}) } };
}


// --- layout.js ---
// ================================================================
// layout.js — Shared layout engine for dag-map
// ================================================================
// Topological sort, route extraction via greedy longest-path,
// Y-position assignment with occupancy tracking, node positioning,
// and route/extra-edge path building with pluggable routing.




// ================================================================
// COLORS & CONSTANTS (kept for backward compatibility)
// ================================================================
const C = {
  paper: '#F5F0E8', ink: '#2C2C2C', muted: '#8C8680', border: '#D4CFC7',
  teal: '#2B8A8E', coral: '#E8846B', amber: '#D4944C', red: '#C45B4A',
};

const CLASS_COLOR = {
  pure: C.teal,
  recordable: C.coral,
  side_effecting: C.amber,
  gate: C.red,
};

/**
 * Determine the dominant node class among a set of node IDs.
 * @param {string[]} nodeIds
 * @param {Map} nodeMap - Map from id to node object
 * @returns {string}
 */
function dominantClass(nodeIds, nodeMap) {
  const counts = {};
  nodeIds.forEach(id => {
    const cls = nodeMap.get(id)?.cls || 'pure';
    counts[cls] = (counts[cls] || 0) + 1;
  });
  let best = 'pure', bestCount = 0;
  for (const [cls, count] of Object.entries(counts)) {
    if (count > bestCount) { best = cls; bestCount = count; }
  }
  return best;
}

/**
 * Compute the full metro-map layout for a DAG.
 *
 * @param {object} dag - { nodes: [{id, label, cls}], edges: [[from, to]] }
 * @param {object} [options]
 * @param {'bezier'|'angular'} [options.routing='bezier'] - routing style
 * @param {number} [options.trunkY=160] - absolute Y for trunk route
 * @param {number} [options.mainSpacing=34] - px between depth-1 branch lanes
 * @param {number} [options.subSpacing=16] - px between depth-2+ sub-branch lanes
 * @param {number} [options.layerSpacing=38] - px between topological layers
 * @param {number} [options.progressivePower=2.2] - power for progressive curves
 * @param {number} [options.scale=1.5] - scale multiplier for all spatial values
 * @returns {object} { positions, routePaths, extraEdges, width, height, routes, ... }
 */
function layoutMetro(dag, options = {}) {
  const routing = options.routing || 'bezier';
  const direction = options.direction || 'ltr';
  const theme = resolveTheme(options.theme);
  const classColor = {
    pure: theme.classes.pure,
    recordable: theme.classes.recordable,
    side_effecting: theme.classes.side_effecting,
    gate: theme.classes.gate,
  };
  const s = options.scale ?? 1.5;
  const TRUNK_Y = (options.trunkY ?? 160) * s;
  const MAIN_SPACING = (options.mainSpacing ?? 34) * s;
  const SUB_SPACING = (options.subSpacing ?? 16) * s;
  const layerSpacing = (options.layerSpacing ?? 38) * s;
  const progressivePower = options.progressivePower ?? 2.2;
  const maxLanes = options.maxLanes ?? null;

  const { nodes, edges } = dag;
  const nodeMap = new Map(nodes.map(n => [n.id, n]));
  const childrenOf = new Map(), parentsOf = new Map();
  nodes.forEach(n => { childrenOf.set(n.id, []); parentsOf.set(n.id, []); });
  edges.forEach(([f, t]) => { childrenOf.get(f).push(t); parentsOf.get(t).push(f); });

  // ── STEP 1: Topological sort + layer assignment ──
  const layer = new Map();
  const inDeg = new Map();
  nodes.forEach(nd => inDeg.set(nd.id, parentsOf.get(nd.id).length));
  const queue = nodes.filter(nd => inDeg.get(nd.id) === 0).map(nd => nd.id);
  queue.forEach(id => layer.set(id, 0));
  const topo = [];
  while (queue.length) {
    const u = queue.shift(); topo.push(u);
    for (const v of childrenOf.get(u)) {
      layer.set(v, Math.max(layer.get(v) || 0, layer.get(u) + 1));
      inDeg.set(v, inDeg.get(v) - 1);
      if (inDeg.get(v) === 0) queue.push(v);
    }
  }
  const maxLayer = Math.max(...topo.map(id => layer.get(id)));

  // ── STEP 2: Extract routes via greedy longest-path ──
  function longestPathIn(nodeSet) {
    const dist = new Map(), prev = new Map();
    nodeSet.forEach(id => { dist.set(id, 0); prev.set(id, null); });
    for (const u of topo) {
      if (!nodeSet.has(u)) continue;
      for (const v of childrenOf.get(u)) {
        if (!nodeSet.has(v)) continue;
        if (dist.get(u) + 1 > dist.get(v)) {
          dist.set(v, dist.get(u) + 1); prev.set(v, u);
        }
      }
    }
    let best = -1, end = null;
    nodeSet.forEach(id => { if (dist.get(id) > best) { best = dist.get(id); end = id; } });
    if (end === null) return [];
    const path = [];
    for (let c = end; c !== null; c = prev.get(c)) path.unshift(c);
    return path;
  }

  const routes = [];
  const assigned = new Set();
  const nodeRoute = new Map();

  const trunk = longestPathIn(new Set(topo));
  routes.push({ nodes: trunk, lane: 0, parentRoute: -1, depth: 0 });
  trunk.forEach(id => { assigned.add(id); nodeRoute.set(id, 0); });

  let safety = 0;
  while (assigned.size < nodes.length && safety++ < 300) {
    const unassigned = [];
    nodes.forEach(nd => { if (!assigned.has(nd.id)) unassigned.push(nd.id); });
    if (unassigned.length === 0) break;

    const unassignedSet = new Set(unassigned);
    let bestPath = longestPathIn(unassignedSet);
    if (bestPath.length === 0) {
      unassigned.forEach(id => { assigned.add(id); nodeRoute.set(id, 0); });
      break;
    }

    const firstNode = bestPath[0];
    const assignedParents = parentsOf.get(firstNode).filter(p => assigned.has(p));
    let parentRouteIdx = 0;
    if (assignedParents.length > 0) {
      bestPath.unshift(assignedParents[0]);
      parentRouteIdx = nodeRoute.get(assignedParents[0]) ?? 0;
    }

    const lastNode = bestPath[bestPath.length - 1];
    const assignedChildren = childrenOf.get(lastNode).filter(c => assigned.has(c));
    if (assignedChildren.length > 0) {
      bestPath.push(assignedChildren[0]);
    }

    const ri = routes.length;
    const parentDepth = routes[parentRouteIdx]?.depth ?? 0;
    routes.push({ nodes: bestPath, lane: 0, parentRoute: parentRouteIdx, depth: parentDepth + 1 });
    bestPath.forEach(id => {
      if (!assigned.has(id)) { assigned.add(id); nodeRoute.set(id, ri); }
    });
  }

  // ── STEP 3: Y-position assignment with occupancy tracking ──
  const routeChildren = new Map();
  routes.forEach((_, i) => routeChildren.set(i, []));
  for (let ri = 1; ri < routes.length; ri++) {
    const pi = routes[ri].parentRoute;
    if (routeChildren.has(pi)) routeChildren.get(pi).push(ri);
    else routeChildren.set(pi, [ri]);
  }

  const routeLayerRange = routes.map(route => {
    let min = Infinity, max = -Infinity;
    route.nodes.forEach(id => {
      const l = layer.get(id);
      if (l < min) min = l;
      if (l > max) max = l;
    });
    return [min, max];
  });

  const routeOwnLength = routes.map((route, ri) => {
    return route.nodes.filter(id => nodeRoute.get(id) === ri).length;
  });

  const routeDomClass = routes.map((route, ri) => {
    const ownNodes = route.nodes.filter(id => nodeRoute.get(id) === ri);
    return dominantClass(ownNodes, nodeMap);
  });

  // Y occupancy tracker: tracks used Y ranges per layer range
  const yOccupancy = []; // [{y, sL, eL}]
  function canUseY(y, sL, eL, minGap) {
    for (const occ of yOccupancy) {
      if (sL <= occ.eL + 1 && eL >= occ.sL - 1) {
        if (Math.abs(y - occ.y) < minGap) return false;
      }
    }
    return true;
  }
  function claimY(y, sL, eL) {
    yOccupancy.push({ y, sL, eL });
  }

  // Assign trunk
  const routeY = new Map();
  routeY.set(0, TRUNK_Y);
  claimY(TRUNK_Y, routeLayerRange[0][0], routeLayerRange[0][1]);

  // BFS from trunk
  const laneQueue = [0];
  const assignedRoutes = new Set([0]);

  while (laneQueue.length > 0) {
    const pi = laneQueue.shift();
    const parentY = routeY.get(pi);
    const children = routeChildren.get(pi) || [];

    // Sort: longest routes first
    children.sort((a, b) => routeOwnLength[b] - routeOwnLength[a]);

    let childAbove = 0, childBelow = 0;

    for (const ci of children) {
      if (assignedRoutes.has(ci)) continue;
      const [sL, eL] = routeLayerRange[ci];
      const cls = routeDomClass[ci];
      const depth = routes[ci].depth;
      const ownLength = routeOwnLength[ci];

      // Spacing depends on depth and route length
      const spacing = (depth <= 1 && ownLength > 2) ? MAIN_SPACING : SUB_SPACING;

      // Direction: side_effecting below, recordable above,
      // pure alternates but prefers above for balance
      let preferBelow;
      if (cls === 'side_effecting') {
        preferBelow = true;
      } else if (cls === 'recordable' && depth === 1) {
        preferBelow = false;
      } else {
        preferBelow = childBelow <= childAbove;
      }

      // Search for an available Y position
      const maxDist = maxLanes ? maxLanes : 8;
      let y = null;
      for (let dist = 1; dist <= maxDist; dist++) {
        const tryY = parentY + (preferBelow ? dist * spacing : -dist * spacing);
        if (canUseY(tryY, sL, eL, spacing * 0.8)) {
          y = tryY; break;
        }
        const tryAlt = parentY + (preferBelow ? -dist * spacing : dist * spacing);
        if (canUseY(tryAlt, sL, eL, spacing * 0.8)) {
          y = tryAlt; break;
        }
      }
      if (y === null) {
        y = parentY + (preferBelow ? (childBelow + 1) * spacing : -(childAbove + 1) * spacing);
      }

      routeY.set(ci, y);
      claimY(y, sL, eL);
      assignedRoutes.add(ci);
      laneQueue.push(ci);

      if (y > parentY) childBelow++;
      else childAbove++;
    }
  }

  // ── STEP 4: Position nodes ──
  const margin = { top: 0, left: 50 * s, bottom: 0, right: 40 * s };

  // Each node's Y comes from its route's Y
  const nodeYDirect = new Map();
  nodes.forEach(nd => {
    const ri = nodeRoute.get(nd.id);
    nodeYDirect.set(nd.id, (ri !== undefined) ? routeY.get(ri) : TRUNK_Y);
  });

  // Find Y bounds
  let minY = Infinity, maxY = -Infinity;
  nodes.forEach(nd => {
    const y = nodeYDirect.get(nd.id);
    if (y < minY) minY = y;
    if (y > maxY) maxY = y;
  });

  // Add padding
  const topPad = 50 * s;
  const bottomPad = 80 * s;

  const positions = new Map();
  nodes.forEach(nd => {
    positions.set(nd.id, {
      x: margin.left + layer.get(nd.id) * layerSpacing,
      y: topPad + (nodeYDirect.get(nd.id) - minY),
    });
  });

  const width = margin.left + (maxLayer + 1) * layerSpacing + margin.right;
  const height = topPad + (maxY - minY) + bottomPad;

  // Compute screen Y for each route (after topPad/minY shift)
  const routeYScreen = new Map();
  for (const [ri, y] of routeY.entries()) {
    routeYScreen.set(ri, topPad + (y - minY));
  }
  const trunkYScreen = topPad + (TRUNK_Y - minY);

  // ── STEP 5: Build route paths ──
  const pathFn = routing === 'bezier' ? bezierPath : angularPath;
  const opBoost = theme.lineOpacity ?? 1.0;

  const routePaths = routes.map((route, ri) => {
    const pts = route.nodes.map(id => ({ ...positions.get(id), id }));
    const ownNodes = route.nodes.filter(id => nodeRoute.get(id) === ri);
    const color = classColor[dominantClass(ownNodes, nodeMap)] || classColor.pure;

    let thickness, opacity;
    if (ri === 0) {
      thickness = 5 * s;
      opacity = Math.min(0.6 * opBoost, 1);
    } else if (ownNodes.length > 5) {
      thickness = 3.5 * s;
      opacity = Math.min(0.45 * opBoost, 1);
    } else if (ownNodes.length > 2) {
      thickness = 2.5 * s;
      opacity = Math.min(0.35 * opBoost, 1);
    } else {
      thickness = 2 * s;
      opacity = Math.min(0.28 * opBoost, 1);
    }

    const segments = [];
    for (let i = 1; i < pts.length; i++) {
      const p = pts[i - 1], q = pts[i];
      const srcNode = nodeMap.get(p.id);
      const segColor = classColor[srcNode?.cls] || color;
      const segDashed = srcNode?.cls === 'gate';

      // Determine reference Y for convergence/divergence detection
      let segRefY;
      if (routing === 'angular') {
        // R9: Interchange-based direction detection
        const srcIsOwn = nodeRoute.get(p.id) === ri;
        const dstIsOwn = nodeRoute.get(q.id) === ri;

        if (!srcIsOwn && dstIsOwn) {
          // FORK: source is interchange, dest is own node -> DIVERGENCE
          segRefY = p.y;
        } else if (srcIsOwn && !dstIsOwn) {
          // RETURN: source is own node, dest is interchange -> CONVERGENCE
          segRefY = q.y;
        } else {
          // Both own or both interchange -> use trunk Y as fallback
          segRefY = trunkYScreen;
        }
      } else {
        segRefY = trunkYScreen;
      }

      const d = `M ${p.x} ${p.y} ` + pathFn(p.x, p.y, q.x, q.y, ri, i, segRefY, { progressivePower });
      segments.push({ d, color: segColor, thickness, opacity, dashed: segDashed });
    }
    return segments;
  });

  // ── STEP 6: Extra edges (cross-route connections) ──
  const routeEdgeSet = new Set();
  routes.forEach(route => {
    for (let i = 1; i < route.nodes.length; i++)
      routeEdgeSet.add(`${route.nodes[i - 1]}\u2192${route.nodes[i]}`);
  });

  const extraEdges = [];
  edges.forEach(([f, t]) => {
    if (routeEdgeSet.has(`${f}\u2192${t}`)) return;
    const p = positions.get(f), q = positions.get(t);
    if (!p || !q) return;
    const srcNode = nodeMap.get(f);
    const color = classColor[srcNode?.cls] || classColor.pure;
    const extraIdx = (f.length * 3 + t.length * 7) % 17;

    // Extra edges always use trunkScreenY as reference
    const refY = trunkYScreen;

    const d = `M ${p.x} ${p.y} ` + pathFn(p.x, p.y, q.x, q.y, extraIdx, 0, refY, { progressivePower });
    extraEdges.push({ d, color, thickness: 1.8 * s, opacity: Math.min(0.22 * opBoost, 1), dashed: srcNode?.cls === 'gate' });
  });

  // Node lane info (for compatibility)
  const nodeLane = new Map();
  nodes.forEach(nd => {
    const ri = nodeRoute.get(nd.id);
    nodeLane.set(nd.id, ri !== undefined ? routes[ri].lane : 0);
  });

  if (direction === 'ttb') {
    for (const [id, pos] of positions) {
      positions.set(id, { x: pos.y, y: pos.x });
    }
    function swapPathCoords(d) {
      return d.replace(/([MLCQ])\s*/gi, '\n$1 ').split('\n').filter(Boolean).map(seg => {
        const cmd = seg[0];
        const nums = seg.slice(1).trim().split(/[\s,]+/).map(Number);
        const swapped = [];
        for (let i = 0; i < nums.length; i += 2) {
          swapped.push(nums[i + 1], nums[i]);
        }
        return cmd + ' ' + swapped.join(' ');
      }).join(' ');
    }
    for (const segments of routePaths) {
      for (const seg of segments) { seg.d = swapPathCoords(seg.d); }
    }
    for (const seg of extraEdges) { seg.d = swapPathCoords(seg.d); }
    return {
      positions, routePaths, extraEdges, width: height, height: width,
      maxLayer, routes, nodeLane, nodeRoute, laneSpacing: MAIN_SPACING,
      layerSpacing, minY, maxY, routeYScreen, trunkYScreen, scale: s, theme,
      orientation: 'ttb',
    };
  }

  return {
    positions,
    routePaths,
    extraEdges,
    width,
    height,
    maxLayer,
    routes,
    nodeLane,
    nodeRoute,
    laneSpacing: MAIN_SPACING,
    layerSpacing,
    minY,
    maxY,
    routeYScreen,
    trunkYScreen,
    scale: s,
    theme,
  };
}


// --- render.js ---
// ================================================================
// render.js — SVG rendering for dag-map
// ================================================================
// Renders a DAG layout into an SVG string.
// Supports horizontal and diagonal label modes.
// Colors are driven by layout.theme (from the theme system).
//
// Two color modes:
//   cssVars: false (default) — inline hex colors, portable SVG
//   cssVars: true — CSS var() references, themeable from CSS

// Backward-compat import — only used if layout.theme is missing

/**
 * Render a DAG layout as an SVG string.
 *
 * @param {object} dag - { nodes: [{id, label, cls}], edges: [[from, to]] }
 * @param {object} layout - result from layoutMetro()
 * @param {object} [options]
 * @param {string} [options.title] - title displayed at top of SVG
 * @param {boolean} [options.diagonalLabels=false] - tube-map style diagonal labels
 * @param {number} [options.labelAngle=45] - angle in degrees for diagonal labels (0-90)
 * @param {boolean} [options.showLegend=true] - show legend at bottom
 * @param {object} [options.legendLabels] - custom legend labels per class
 * @param {boolean} [options.cssVars=false] - use CSS var() references instead of inline colors
 * @returns {string} SVG markup
 */
function renderSVG(dag, layout, options = {}) {
  const {
    title,
    diagonalLabels = false,
    labelAngle = 45,
    showLegend = true,
    cssVars = false,
    labelSize = 5,
  } = options;

  const defaultLegendLabels = {
    pure: 'Primary',
    recordable: 'Secondary',
    side_effecting: 'Tertiary',
    gate: 'Control',
  };
  const legendLabels = { ...defaultLegendLabels, ...(options.legendLabels || {}) };

  // Resolve colors from theme (with backward-compat fallback)
  const theme = layout.theme || { paper: C.paper, ink: C.ink, muted: C.muted, border: C.border, classes: { pure: C.teal, recordable: C.coral, side_effecting: C.amber, gate: C.red } };

  // Color resolver: either inline hex or CSS var() reference
  const clsVar = (cls) => `var(--dm-cls-${cls.replace(/_/g, '-')})`;
  const col = cssVars ? {
    paper:  'var(--dm-paper)',
    ink:    'var(--dm-ink)',
    muted:  'var(--dm-muted)',
    border: 'var(--dm-border)',
    cls:    (cls) => clsVar(cls),
  } : {
    paper:  theme.paper,
    ink:    theme.ink,
    muted:  theme.muted,
    border: theme.border,
    cls:    (cls) => theme.classes[cls] || theme.classes.pure,
  };

  const { positions, routePaths, extraEdges, width, height, routes, nodeRoute } = layout;
  const s = layout.scale || 1;
  const nodeMap = new Map(dag.nodes.map(n => [n.id, n]));
  const inDeg = new Map(), outDeg = new Map();
  dag.nodes.forEach(nd => { inDeg.set(nd.id, 0); outDeg.set(nd.id, 0); });
  dag.edges.forEach(([f, t]) => { outDeg.set(f, outDeg.get(f) + 1); inDeg.set(t, inDeg.get(t) + 1); });

  const displayTitle = title || `DAG (${dag.nodes.length} OPS)`;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" font-family="'IBM Plex Mono', 'Courier New', monospace">\n`;
  svg += `<rect width="${width}" height="${height}" fill="${col.paper}"/>\n`;

  svg += `<text x="${24 * s}" y="${22 * s}" font-size="${10 * s}" fill="${col.ink}" letter-spacing="0.06em" opacity="0.5">${displayTitle}</text>\n`;
  svg += `<text x="${24 * s}" y="${34 * s}" font-size="${6.5 * s}" fill="${col.muted}">Topological layout. Colored lines = execution paths by node class.</text>\n`;

  // Route lines — extra edges first (behind)
  // Note: route/edge colors come from layout (already resolved to hex).
  // In cssVars mode, we need to map them back to CSS var references.
  function segColor(hexColor) {
    if (!cssVars) return hexColor;
    // Find which class this hex color belongs to
    for (const [cls, clsHex] of Object.entries(theme.classes)) {
      if (clsHex === hexColor) return clsVar(cls);
    }
    return hexColor; // fallback to hex if no match
  }

  extraEdges.forEach(seg => {
    svg += `<path d="${seg.d}" stroke="${segColor(seg.color)}" stroke-width="${seg.thickness}" fill="none" `;
    svg += `stroke-linecap="round" stroke-linejoin="round" opacity="${seg.opacity}"`;
    if (seg.dashed) svg += ` stroke-dasharray="${4 * s},${3 * s}"`;
    svg += `/>\n`;
  });

  routePaths.forEach(segments => {
    segments.forEach(seg => {
      svg += `<path d="${seg.d}" stroke="${segColor(seg.color)}" stroke-width="${seg.thickness}" fill="none" `;
      svg += `stroke-linecap="round" stroke-linejoin="round" opacity="${seg.opacity}"`;
      if (seg.dashed) svg += ` stroke-dasharray="${4 * s},${3 * s}"`;
      svg += `/>\n`;
    });
  });

  // Stations
  dag.nodes.forEach(nd => {
    const pos = positions.get(nd.id);
    if (!pos) return;
    const color = col.cls(nd.cls || 'pure');
    const isInterchange = (inDeg.get(nd.id) > 1 || outDeg.get(nd.id) > 1);
    const isGate = nd.cls === 'gate';

    const ri = nodeRoute.get(nd.id);
    const depth = (ri !== undefined && routes[ri]) ? routes[ri].depth : 0;
    let r;
    if (isInterchange) {
      r = 5.5 * s;
    } else if (depth <= 1) {
      r = 3.5 * s;
    } else {
      r = 3 * s;
    }

    svg += `<circle cx="${pos.x.toFixed(1)}" cy="${pos.y.toFixed(1)}" r="${r}" `;
    svg += `fill="${col.paper}" stroke="${color}" stroke-width="${(isGate ? 2 : 1.6) * s}"`;
    if (isGate) svg += ` stroke-dasharray="${2 * s},${1.5 * s}"`;
    svg += `/>\n`;

    if (isInterchange && !isGate) {
      svg += `<circle cx="${pos.x.toFixed(1)}" cy="${pos.y.toFixed(1)}" r="${2 * s}" fill="${color}" opacity="0.3"/>\n`;
    }
    if (isGate) {
      svg += `<circle cx="${pos.x.toFixed(1)}" cy="${pos.y.toFixed(1)}" r="${2.2 * s}" fill="${col.cls('gate')}" opacity="0.4"/>\n`;
    }

    const fs = labelSize * s;
    if (diagonalLabels) {
      const tickLen = 6 * s;
      const angle = -labelAngle;
      const rad = angle * Math.PI / 180;
      const tickEndX = pos.x + Math.cos(rad) * tickLen;
      const tickEndY = pos.y + Math.sin(rad) * tickLen;
      svg += `<line x1="${pos.x.toFixed(1)}" y1="${(pos.y - r).toFixed(1)}" `;
      svg += `x2="${tickEndX.toFixed(1)}" y2="${(tickEndY - r).toFixed(1)}" `;
      svg += `stroke="${col.ink}" stroke-width="${0.6 * s}" opacity="0.3"/>\n`;
      const textX = tickEndX + 1 * s;
      const textY = tickEndY - r - 1 * s;
      svg += `<text x="${textX.toFixed(1)}" y="${textY.toFixed(1)}" `;
      svg += `font-size="${fs * 0.9}" fill="${col.ink}" text-anchor="start" opacity="0.55" `;
      svg += `transform="rotate(${angle} ${textX.toFixed(1)} ${textY.toFixed(1)})">${nd.label}</text>\n`;
    } else if (layout.orientation === 'ttb') {
      const labelX = pos.x + r + 4 * s;
      const labelY = pos.y + fs * 0.35;
      svg += `<text x="${labelX.toFixed(1)}" y="${labelY.toFixed(1)}" `;
      svg += `font-size="${fs}" fill="${col.ink}" text-anchor="start" opacity="0.55">${nd.label}</text>\n`;
    } else {
      const labelY = pos.y + r + 8 * s;
      svg += `<text x="${pos.x.toFixed(1)}" y="${labelY.toFixed(1)}" `;
      svg += `font-size="${fs}" fill="${col.ink}" text-anchor="middle" opacity="0.55">${nd.label}</text>\n`;
    }
  });

  // Legend
  if (showLegend) {
    const ly = height - 55 * s;
    svg += `<line x1="${24 * s}" y1="${ly}" x2="${width - 24 * s}" y2="${ly}" stroke="${col.border}" stroke-width="${0.3 * s}"/>\n`;

    const lines = [
      [legendLabels.pure, col.cls('pure')], [legendLabels.side_effecting, col.cls('side_effecting')],
      [legendLabels.recordable, col.cls('recordable')], [legendLabels.gate, col.cls('gate')],
    ];
    lines.forEach(([label, color], i) => {
      const x = 24 * s + i * 160 * s;
      svg += `<line x1="${x}" y1="${ly + 16 * s}" x2="${x + 22 * s}" y2="${ly + 16 * s}" stroke="${color}" stroke-width="${3.5 * s}" opacity="0.5" stroke-linecap="round"`;
      if (i === 3) svg += ` stroke-dasharray="${4 * s},${3 * s}"`;
      svg += `/>\n`;
      svg += `<text x="${x + 28 * s}" y="${ly + 19 * s}" font-size="${6.5 * s}" fill="${col.muted}">${label}</text>\n`;
    });

    const vertSpread = layout.maxY - layout.minY;
    svg += `<text x="${24 * s}" y="${ly + 38 * s}" font-size="${6 * s}" fill="${col.muted}">${dag.nodes.length} ops | ${dag.edges.length} edges | ${routes.length} routes | spread: ${vertSpread.toFixed(0)}px | scale: ${s}x</text>\n`;
  }

  svg += `</svg>`;
  return svg;
}

 */

}

      n('deploy_conf', 'deploy_conf', 'side_effecting'),
      n('migrate', 'migrate', 'side_effecting'), n('db_tables', 'db_tables', 'side_effecting'),
      n('db_indexes', 'db_indexes', 'side_effecting'), n('constraints', 'constraints', 'side_effecting'),
      n('triggers', 'triggers', 'side_effecting'), n('db_verify', 'db_verify', 'side_effecting'),
      n('seed_ref', 'seed_ref', 'side_effecting'), n('seed_test', 'seed_test', 'side_effecting'),
      n('seed_demo', 'seed_demo', 'side_effecting'), n('db_ready', 'db_ready', 'side_effecting'),
      n('refactor', 'refactor', 'recordable'), n('optimize', 'optimize', 'recordable'),
      n('gen_docs', 'gen_docs', 'recordable'), n('merge_all', 'merge_all', 'pure'),
      n('begin_test', 'begin_test', 'pure'), n('test_setup', 'test_setup', 'pure'),
      n('unit_core', 'unit_core', 'pure'), n('lint', 'lint', 'pure'),
      n('format', 'format', 'pure'), n('typecheck', 'typecheck', 'pure'),
      n('integ_api', 'integ_api', 'side_effecting'), n('integ_db', 'integ_db', 'side_effecting'),
      n('integ_auth', 'integ_auth', 'side_effecting'),
      n('all_pass', 'all_pass', 'pure'), n('llm_review', 'llm_review', 'recordable'),
      n('review', 'review', 'gate'), n('deploy', 'deploy', 'side_effecting'),
      n('verify', 'verify', 'side_effecting'), n('notify', 'notify', 'side_effecting'),
      n('log_run', 'log', 'side_effecting'),
    ],
    edges: [
      ['parse', 'analyze'], ['analyze', 'decompose'],
      ['decompose', 'plan_impl'], ['decompose', 'plan_test'], ['decompose', 'arch_review'],
      ['arch_review', 'deps'], ['deps', 'arch_plan'], ['plan_test', 'coverage'],
      ['plan_impl', 'approve'], ['coverage', 'approve'], ['arch_plan', 'approve'],
      ['approve', 'begin'],
      ['begin', 'scaffold'], ['begin', 'schema'], ['begin', 'routes'], ['begin', 'layout'],
      ['begin', 'env_conf'], ['begin', 'migrate'],
      ['scaffold', 'gen_core'], ['gen_core', 'gen_types'], ['gen_types', 'gen_logic'],
      ['gen_logic', 'compile'], ['compile', 'link'],
      ['schema', 'models'], ['models', 'validate'], ['validate', 'serialize'], ['serialize', 'index'],
      ['routes', 'handlers'], ['handlers', 'middleware'], ['middleware', 'auth'],
      ['layout', 'components'], ['components', 'pages'], ['pages', 'styles'],
      ['components', 'forms'], ['components', 'tables'], ['components', 'charts'],
      ['styles', 'storybook'], ['storybook', 'a11y'], ['a11y', 'ui_bundle'],
      ['forms', 'storybook'], ['tables', 'storybook'], ['charts', 'storybook'],
      ['env_conf', 'docker'], ['docker', 'ci_conf'], ['ci_conf', 'secrets'], ['secrets', 'deploy_conf'],
      ['migrate', 'db_tables'], ['db_tables', 'db_indexes'], ['db_indexes', 'constraints'],
      ['constraints', 'triggers'], ['triggers', 'db_verify'],
      ['constraints', 'seed_ref'], ['seed_ref', 'seed_test'], ['seed_test', 'seed_demo'],
      ['seed_demo', 'db_ready'], ['db_verify', 'db_ready'],
      ['gen_logic', 'refactor'], ['refactor', 'optimize'], ['optimize', 'link'],
      ['compile', 'gen_docs'],
      ['link', 'merge_all'], ['index', 'merge_all'], ['auth', 'merge_all'],
      ['ui_bundle', 'merge_all'], ['deploy_conf', 'merge_all'], ['db_ready', 'merge_all'],
      ['gen_docs', 'merge_all'],
      ['merge_all', 'begin_test'], ['begin_test', 'test_setup'],
      ['test_setup', 'unit_core'], ['test_setup', 'lint'], ['test_setup', 'integ_api'], ['test_setup', 'integ_db'],
      ['lint', 'format'], ['format', 'typecheck'],
      ['unit_core', 'all_pass'], ['typecheck', 'all_pass'], ['integ_api', 'integ_auth'],
      ['integ_auth', 'all_pass'], ['integ_db', 'all_pass'],
      ['all_pass', 'llm_review'], ['llm_review', 'review'],
      ['review', 'deploy'], ['deploy', 'verify'], ['deploy', 'notify'], ['notify', 'log_run'],
    ]
  }),

  diamond: () => ({
    nodes: [
      n('start', 'start', 'pure'),
      n('a', 'branch_a', 'recordable'), n('b', 'branch_b', 'side_effecting'),
      n('c', 'branch_c', 'pure'), n('d', 'branch_d', 'recordable'),
      n('merge', 'merge', 'pure'),
      n('final', 'final', 'gate'),
    ],
    edges: [
      ['start', 'a'], ['start', 'b'], ['start', 'c'], ['start', 'd'],
      ['a', 'merge'], ['b', 'merge'], ['c', 'merge'], ['d', 'merge'],
      ['merge', 'final'],
    ]
  }),

  linear: () => ({
    nodes: [
      n('a', 'step_1', 'pure'), n('b', 'step_2', 'pure'), n('c', 'step_3', 'recordable'),
      n('d', 'step_4', 'pure'), n('e', 'step_5', 'side_effecting'),
    ],
    edges: [['a', 'b'], ['b', 'c'], ['c', 'd'], ['d', 'e']]
  }),

  wide_fan: () => {
    const nodes = [n('src', 'source', 'pure')];
    const edges = [];
    const classes = ['pure', 'pure', 'recordable', 'side_effecting', 'pure', 'recordable', 'side_effecting', 'pure'];
    for (let i = 0; i < 8; i++) {
      nodes.push(n(`w${i}`, `worker_${i}`, classes[i]));
      edges.push(['src', `w${i}`]);
    }
    nodes.push(n('sink', 'collect', 'pure'));
    for (let i = 0; i < 8; i++) edges.push([`w${i}`, 'sink']);
    return { nodes, edges };
  },

  pipeline: () => {
    const nodes = []; const edges = [];
    for (let i = 0; i < 15; i++) {
      const cls = i < 3 ? 'recordable' : i < 10 ? 'pure' : 'side_effecting';
      nodes.push(n(`p${i}`, `stage_${i}`, cls));
      if (i > 0) edges.push([`p${i - 1}`, `p${i}`]);
    }
    for (let b = 0; b < 3; b++) {
      const start = 3 + b * 3;
      nodes.push(n(`b${b}a`, `branch_${b}_a`, 'side_effecting'));
      nodes.push(n(`b${b}b`, `branch_${b}_b`, 'side_effecting'));
      edges.push([`p${start}`, `b${b}a`]);
      edges.push([`b${b}a`, `b${b}b`]);
      edges.push([`b${b}b`, `p${start + 2}`]);
    }
    return { nodes, edges };
  },

  deep_tree: () => {
    const nodes = [n('root', 'root', 'recordable')];
    const edges = [];
    function addLevel(parentId, depth, maxDepth) {
      if (depth >= maxDepth) return;
      const cls = depth < 2 ? 'pure' : 'side_effecting';
      const l = n(`${parentId}_l`, `${parentId}_l`, cls);
      const r = n(`${parentId}_r`, `${parentId}_r`, cls);
      nodes.push(l, r);
      edges.push([parentId, l.id], [parentId, r.id]);
      addLevel(l.id, depth + 1, maxDepth);
      addLevel(r.id, depth + 1, maxDepth);
    }
    addLevel('root', 0, 4);
    return { nodes, edges };
  },

  dense_merge: () => {
    const nodes = []; const edges = [];
    for (let i = 0; i < 8; i++) {
      for (let j = 0; j < 3; j++) {
        nodes.push(n(`c${i}_${j}`, `chain${i}_${j}`, ['pure', 'recordable', 'side_effecting'][j]));
        if (j > 0) edges.push([`c${i}_${j - 1}`, `c${i}_${j}`]);
      }
    }
    for (let i = 0; i < 4; i++) {
      nodes.push(n(`m${i}`, `merge_${i}`, 'pure'));
      edges.push([`c${i * 2}_2`, `m${i}`]);
      edges.push([`c${i * 2 + 1}_2`, `m${i}`]);
    }
    nodes.push(n('final', 'final', 'recordable'));
    for (let i = 0; i < 4; i++) edges.push([`m${i}`, 'final']);
    return { nodes, edges };
  },
};


// --- app ---
function render() {
  var dagName = document.getElementById('dagSelect').value;
  var direction = document.getElementById('directionSelect').value;
  var routing = document.getElementById('routingSelect').value;
  var theme = document.getElementById('themeSelect').value;
  var diagonalLabels = document.getElementById('diagonalLabels').checked;
  var cssVars = document.getElementById('cssVars').checked;
  var labelAngle = parseInt(document.getElementById('labelAngle').value, 10);
  var labelSize = parseFloat(document.getElementById('labelSizeSlider').value);
  var scale = parseFloat(document.getElementById('scaleSlider').value);
  var layerSpacing = parseInt(document.getElementById('layerSpacingSlider').value, 10);
  var mainSpacing = parseInt(document.getElementById('mainSpacingSlider').value, 10);
  var subSpacing = parseInt(document.getElementById('subSpacingSlider').value, 10);
  var progressivePower = parseFloat(document.getElementById('powerSlider').value);

  // Update value displays
  document.getElementById('labelSizeValue').textContent = labelSize;
  document.getElementById('scaleValue').textContent = scale;
  document.getElementById('layerSpacingValue').textContent = layerSpacing;
  document.getElementById('mainSpacingValue').textContent = mainSpacing;
  document.getElementById('subSpacingValue').textContent = subSpacing;
  document.getElementById('powerValue').textContent = progressivePower;

  document.getElementById('angleControl').classList.toggle('visible', diagonalLabels);
  document.getElementById('angleValue').textContent = labelAngle + '°';

  // Update CSS custom properties to match theme
  var resolved = resolveTheme(theme);
  var root = document.documentElement;
  root.style.setProperty('--dm-paper', resolved.paper);
  root.style.setProperty('--dm-ink', resolved.ink);
  root.style.setProperty('--dm-muted', resolved.muted);
  root.style.setProperty('--dm-border', resolved.border);

  var dag = DAGS[dagName]();
  var title = dagName.toUpperCase().replace(/_/g, ' ') + ' (' + dag.nodes.length + ' OPS)';
  var layoutOpts = { routing: routing, direction: direction, theme: theme, scale: scale, layerSpacing: layerSpacing, mainSpacing: mainSpacing, subSpacing: subSpacing, progressivePower: progressivePower };
  var renderOpts = { title: title, diagonalLabels: diagonalLabels, labelAngle: labelAngle, labelSize: labelSize, cssVars: cssVars };
  var layout = layoutMetro(dag, layoutOpts);
  var svg = renderSVG(dag, layout, renderOpts);
  document.getElementById('mapContainer').innerHTML = svg;

  // Build copyable code snippet — only show non-default options
  var lo = {};
  if (routing !== 'bezier') lo.routing = routing;
  if (direction !== 'ltr') lo.direction = direction;
  if (theme !== 'cream') lo.theme = theme;
  if (scale !== 1.5) lo.scale = scale;
  if (layerSpacing !== 38) lo.layerSpacing = layerSpacing;
  if (mainSpacing !== 34) lo.mainSpacing = mainSpacing;
  if (subSpacing !== 16) lo.subSpacing = subSpacing;
  if (progressivePower !== 2.2) lo.progressivePower = progressivePower;

  var ro = {};
  if (diagonalLabels) ro.diagonalLabels = true;
  if (diagonalLabels && labelAngle !== 45) ro.labelAngle = labelAngle;
  if (labelSize !== 5) ro.labelSize = labelSize;
  if (cssVars) ro.cssVars = true;

  var loStr = Object.keys(lo).length ? ', ' + JSON.stringify(lo, null, 2) : '';
  var roStr = Object.keys(ro).length ? ', ' + JSON.stringify(ro, null, 2) : '';

  var code = 'const layout = layoutMetro(dag' + loStr + ');\nconst svg = renderSVG(dag, layout' + roStr + ');';

  // Syntax highlight (GitHub-style)
  function highlight(src) {
    return src
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\b(const|let|var)\b/g, '<span style="color:#CF222E">$1</span>')
      .replace(/\b(layoutMetro|renderSVG)\b/g, '<span style="color:#8250DF">$1</span>')
      .replace(/\b(dag|layout|svg)\b/g, '<span style="color:#953800">$1</span>')
      .replace(/"([^"]+)"\s*:/g, '<span style="color:#0550AE">"$1"</span>:')
      .replace(/:\s*"([^"]+)"/g, ': <span style="color:#0A3069">"$1"</span>')
      .replace(/:\s*(true|false)/g, ': <span style="color:#CF222E">$1</span>')
      .replace(/:\s*(\d+\.?\d*)/g, ': <span style="color:#0550AE">$1</span>');
  }

  var el = document.getElementById('optionsBlock');
  el.innerHTML = highlight(code);
}
['dagSelect', 'directionSelect', 'routingSelect', 'themeSelect'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', render);
});
['diagonalLabels', 'cssVars'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', render);
});
['labelAngle', 'labelSizeSlider', 'scaleSlider', 'layerSpacingSlider', 'mainSpacingSlider', 'subSpacingSlider', 'powerSlider'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', render);
});
render();
</script>
